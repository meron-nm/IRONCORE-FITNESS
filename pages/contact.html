<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="../styles/contact.css">
    <link rel="stylesheet" href="../index.html">
</head>

<body>

    <header>
        <nav class="navbar">
            <div class="logo">IRONCORE</div>
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="../index.html#membership-plans">Plans</a></li>
                <li><a href="../index.html#trainers">Trainers</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section id="contact" class="contact-section">
        <h2>GET IN TOUCH</h2>

        <div class="contact-container">
            <form class="contact-form">
                <input type="text" placeholder="NAME:">
                <input type="email" placeholder="EMAIL:">
                <div class="membership-group">
    <label class="group-label">MEMBERSHIP TYPE:</label>
    <div class="radio-options">
        <input type="radio" id="basic" name="membership" checked>
        <label for="basic">BASIC</label>

        <input type="radio" id="pro" name="membership">
        <label for="pro">PRO</label>

        <input type="radio" id="premium" name="membership">
        <label for="premium">PREMIUM</label>
    </div>
</div>
<div class="range-group">
                <label class="group-label">CURRENT FITNESS LEVEL (1-10):</label>
                <input type="range" min="1" max="10" value="5" class="slider">
            </div>
                <textarea placeholder="YOUR MESSAGE HERE:"></textarea>
                <button type="submit" class="btn-send">SEND MESSAGE</button>
            </form>

            <div class="contact-info-card">
                <div class="info-row">
                    <span>📞 +251 912 3456</span>
                    <span>✉️ info@ironcore.com</span>
                </div>
                <p>📍 Addis Ababa, Ethiopia )</p>
               <a href="https://www.google.com/maps/" target="_blank" 
   class="btn-maps">
   OPEN IN GOOGLE MAPS
</a>
            </div>
        </div>
    </section>
    <!-- Footer -->
    <footer>
        <p>© 2026 Fitness Club | Addis Ababa, Ethiopia</p>
    </footer>


</body>

</html>
